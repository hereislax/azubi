{% extends "base.html" %}

{% block title %}Seite nicht gefunden{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center" style="min-height: 60vh;">
    <i class="bi bi-map text-secondary" style="font-size: 5rem;"></i>
    <h1 class="mt-3 fw-bold">404</h1>
    <h4 class="text-muted mb-3">Seite nicht gefunden</h4>
    <p class="text-muted" style="max-width: 420px;">
        Die angeforderte Seite existiert nicht oder wurde verschoben.
        Bitte prüfen Sie die Adresse oder kehren Sie zur Startseite zurück.
    </p>
    <a href="/" class="btn btn-primary mt-3">
        <i class="bi bi-house me-1"></i> Zur Startseite
    </a>
</div>
{% endblock %}
