<div class="card shadow-sm h-100">
    <div class="card-header d-flex align-items-center gap-2 py-2">
        <i class="bi bi-hourglass-split text-muted me-1"></i>
        <span class="fw-semibold small">Ablaufende Einsätze</span>
        <span class="text-muted fw-normal ms-auto" style="font-size:.72rem;">14 Tage</span>
    </div>
    <div class="card-body p-0">
        {% if ending_soon %}
        <ul class="list-group list-group-flush">
            {% for a in ending_soon %}
            <li class="list-group-item px-3 py-2">
                <div class="d-flex justify-content-between align-items-center gap-2">
                    <div class="min-w-0">
                        <div class="small fw-semibold text-truncate">{{ a.student.first_name }} {{ a.student.last_name }}</div>
                        <div class="text-muted text-truncate" style="font-size:.75rem;">{{ a.unit }}</div>
                    </div>
                    <span class="flex-shrink-0 {% if a.end_date == today %}badge bg-danger{% else %}text-muted{% endif %}" style="font-size:.72rem;">
                        {{ a.end_date|date:"d.m." }}
                    </span>
                </div>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p class="text-muted small p-3 mb-0">Keine Einsätze enden in den nächsten 14 Tagen.</p>
        {% endif %}
    </div>
</div>
