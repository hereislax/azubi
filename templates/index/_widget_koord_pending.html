<div class="card shadow-sm h-100">
    <div class="card-header d-flex align-items-center gap-2 py-2">
        <i class="bi bi-briefcase text-muted me-1"></i>
        <span class="fw-semibold small">Ausstehende Einsätze</span>
        {% if koord_pending_count %}
        <span class="badge bg-warning text-dark rounded-pill ms-auto">{{ koord_pending_count }}</span>
        {% endif %}
    </div>
    <div class="card-body p-0">
        {% if koord_pending %}
        <ul class="list-group list-group-flush">
            {% for a in koord_pending %}
            <li class="list-group-item px-3 py-2">
                <div class="small fw-semibold">{{ a.student.first_name }} {{ a.student.last_name }}</div>
                <div class="text-muted" style="font-size:.75rem;">{{ a.unit }}</div>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p class="text-muted small p-3 mb-0">Keine ausstehenden Einsätze.</p>
        {% endif %}
    </div>
</div>
