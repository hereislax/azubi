<div class="card shadow-sm h-100">
    <div class="card-header d-flex align-items-center gap-2 py-2">
        <i class="bi bi-calendar3 text-muted me-1"></i>
        <span class="fw-semibold small">Anstehende Blöcke</span>
        <span class="text-muted fw-normal" style="font-size:.75rem;">(30 Tage)</span>
    </div>
    <div class="card-body p-0">
        {% if upcoming_blocks %}
        <ul class="list-group list-group-flush">
            {% for block in upcoming_blocks %}
            <li class="list-group-item px-3 py-2">
                <div class="d-flex justify-content-between align-items-start gap-2">
                    <div>
                        <div class="small fw-semibold">{{ block.name }}</div>
                        <div class="text-muted" style="font-size:.75rem;">{{ block.course }}</div>
                    </div>
                    <span class="badge bg-light text-secondary border text-nowrap" style="font-size:.7rem;">
                        {{ block.start_date|date:"d.m." }} – {{ block.end_date|date:"d.m.Y" }}
                    </span>
                </div>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p class="text-muted small p-3 mb-0">Keine Blöcke in den nächsten 30 Tagen.</p>
        {% endif %}
    </div>
</div>
