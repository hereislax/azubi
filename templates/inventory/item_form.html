{% extends "base.html" %}

{% block title %}{{ action }}{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mt-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'inventory:inventory_list' %}">Inventar</a></li>
        {% if item %}
        <li class="breadcrumb-item"><a href="{% url 'inventory:item_detail' item.public_id %}">{{ item.name }}</a></li>
        {% endif %}
        <li class="breadcrumb-item active">{{ action }}</li>
    </ol>
</nav>

<div class="row justify-content-center mt-3">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h1 class="h5 mb-0"><i class="bi bi-box-seam me-1" aria-hidden="true"></i> {{ action }}</h1>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="kern-form-input">
                        <label for="category" class="kern-label">Kategorie <span class="text-danger">*</span></label>
                        <select name="category" id="category" class="kern-form-input__input" required>
                            <option value="">Kategorie wählen …</option>
                            {% for cat in categories %}
                            <option value="{{ cat.pk }}" {% if item and item.category_id == cat.pk %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="kern-form-input">
                        <label for="name" class="kern-label">Bezeichnung <span class="text-danger">*</span></label>
                        <input type="text" name="name" id="name" class="kern-form-input__input"
                               value="{{ item.name|default:'' }}" required>
                    </div>
                    <div class="kern-form-input">
                        <label for="serial_number" class="kern-label">Seriennummer / Kennung</label>
                        <input type="text" name="serial_number" id="serial_number" class="kern-form-input__input"
                               value="{{ item.serial_number|default:'' }}">
                    </div>
                    <div class="kern-form-input">
                        <label for="status" class="kern-label">Status</label>
                        <select name="status" id="status" class="kern-form-input__input">
                            {% for val, label in status_choices %}
                            <option value="{{ val }}" {% if item and item.status == val %}selected{% elif not item and val == 'verfuegbar' %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="kern-form-input">
                        <label for="location" class="kern-label">Lagerort</label>
                        <input type="text" name="location" id="location" class="kern-form-input__input"
                               value="{{ item.location|default:'' }}" placeholder="z. B. Schrank A3">
                    </div>
                    <div class="kern-form-input">
                        <label for="notes" class="kern-label">Notizen</label>
                        <textarea name="notes" id="notes" class="kern-form-input__input" rows="3">{{ item.notes|default:'' }}</textarea>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success"><i class="bi bi-check-circle me-1"></i> Speichern</button>
                        {% if item %}
                        <a href="{% url 'inventory:item_detail' item.public_id %}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i> Abbrechen</a>
                        {% else %}
                        <a href="{% url 'inventory:inventory_list' %}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i> Abbrechen</a>
                        {% endif %}
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
