{% extends "base.html" %}

{% block title %}{{ action }}{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mt-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'inventory:inventory_list' %}">Inventar</a></li>
        <li class="breadcrumb-item"><a href="{% url 'inventory:template_list' %}">Vorlagen</a></li>
        <li class="breadcrumb-item active">{{ action }}</li>
    </ol>
</nav>

<div class="row justify-content-center mt-3">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h1 class="h5 mb-0"><i class="bi bi-file-earmark-word me-1" aria-hidden="true"></i> {{ action }}</h1>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="kern-form-input">
                        <label for="name" class="kern-label">Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" id="name" class="kern-form-input__input"
                               value="{{ tmpl.name|default:'' }}" required>
                    </div>
                    <div class="kern-form-input">
                        <label for="template_file" class="kern-label">Vorlage (.docx) {% if not tmpl %}<span class="text-danger">*</span>{% else %}<span class="kern-label__optional"> – Optional</span>{% endif %}</label>
                        {% if tmpl %}
                        <div class="kern-hint" id="template_file-hint">Leer lassen, um die bestehende Datei zu behalten.</div>
                        {% endif %}
                        <input type="file" name="template_file" id="template_file"
                               class="kern-form-input__input" accept=".docx"
                               {% if not tmpl %}required{% endif %}
                               {% if tmpl %}aria-describedby="template_file-hint"{% endif %}>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_active" id="is_active" class="form-check-input"
                               {% if tmpl.is_active or not tmpl %}checked{% endif %}>
                        <label for="is_active" class="form-check-label">Aktiv</label>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success"><i class="bi bi-check-circle me-1"></i> Speichern</button>
                        <a href="{% url 'inventory:template_list' %}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i> Abbrechen</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
