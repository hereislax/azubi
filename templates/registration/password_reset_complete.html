{% extends "base.html" %}

{% block title %}Passwort gesetzt{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-success">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="bi bi-check-circle me-1"></i> Passwort erfolgreich gesetzt</h5>
            </div>
            <div class="card-body">
                <p>Ihr Passwort wurde gesetzt. Sie können sich jetzt anmelden.</p>
                <a href="{% url 'login' %}" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Zur Anmeldung
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
