{% extends "base.html" %}

{% block title %}Passwort zurücksetzen{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h1 class="h5 mb-0"><i class="bi bi-key me-1" aria-hidden="true"></i> Passwort zurücksetzen</h1>
            </div>
            <div class="card-body">
                <p class="text-muted" id="reset-hint">Geben Sie Ihre E-Mail-Adresse ein. Sie erhalten einen Link zum Zurücksetzen Ihres Passworts.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="kern-form-input">
                        <label for="id_email" class="kern-label">E-Mail-Adresse</label>
                        <input type="email" name="email" id="id_email" class="kern-form-input__input"
                               autofocus required aria-required="true"
                               autocomplete="email" aria-describedby="reset-hint">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-envelope me-1" aria-hidden="true"></i> Link anfordern
                    </button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'login' %}" class="text-muted small">
                        <i class="bi bi-arrow-left me-1"></i> Zurück zur Anmeldung
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
