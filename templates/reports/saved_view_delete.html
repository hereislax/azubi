{% extends "base.html" %}

{% block title %}Sicht löschen{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mt-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'auswertungen' %}">Auswertungen</a></li>
        <li class="breadcrumb-item active" aria-current="page">Sicht löschen</li>
    </ol>
</nav>
<div class="card"><div class="card-body">
    <h2 class="card-title h5"><i class="bi bi-trash me-1 text-danger"></i> Gespeicherte Sicht löschen</h2>
    <p>Möchtest du die Sicht „<strong>{{ view.name }}</strong>" wirklich löschen?</p>
    <form method="post" class="d-flex gap-2 justify-content-end">
        {% csrf_token %}
        <a href="{% url 'report_detail' view.report_slug %}" class="btn btn-outline-secondary">Abbrechen</a>
        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i> Löschen</button>
    </form>
</div></div>
{% endblock %}
