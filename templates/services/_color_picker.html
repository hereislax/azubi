<div class="d-flex align-items-center gap-2 color-row">
    <input type="color" value="{{ value }}" style="width:44px;height:36px;padding:2px;border-radius:6px;cursor:pointer;">
    <input type="text" name="{{ field }}" data-field="{{ field }}"
           value="{{ value }}" maxlength="7" pattern="^#[0-9a-fA-F]{6}$"
           class="kern-form-input__input font-monospace" style="max-width:100px;">
</div>
